# ===================== 站点核心配置 =====================
title: Duckweed's Space
email: 3071974740@qq.com
description: >-
  Duckweed的个人成长空间，记录编程学习、考研备考、读书思考的点滴
baseurl: "" # 根目录部署无需修改
url: "https://Duckweed-yhb.github.io" # GitHub Pages 地址
timezone: Asia/Shanghai # 时区：上海
lang: zh-CN # 站点语言：简体中文
github_username: Duckweed-yhb
zhihu_url: "https://www.zhihu.com/people/54-62-1-34-68"  # 根级配置（匹配social.html）
zhihu_username: "待价而沽"
bilibili_url: "https://space.bilibili.com/3546703303019495"  # 根级配置
bilibili_username: "Duckweed"
logo: "/assets/images/bg.jpg" # 新增：站点logo（可选）
favicon: "/assets/images/bg.jpg" # 新增：浏览器标签页图标
markdown_ext: "markdown,md" # 新增：关键！识别.markdown和.md后缀

# ===================== 主题与插件配置 =====================
theme: minima
plugins:
  - jekyll-feed # RSS 订阅
  - jekyll-seo-tag # SEO 优化
  - jekyll-sitemap # 新增：生成站点地图（利于SEO）
  # - jekyll-paginate  # 分页插件（后续需要时取消注释）

# ===================== 内容配置 =====================
# 全局默认布局与属性
defaults:
  # 文章默认配置
  - scope:
      path: "_posts"
      type: "posts"
    values:
      layout: "post"
      math: true # 所有文章默认加载MathJax
      # 注释掉全局permalink，允许文章手动自定义
      # permalink: /posts/:title/ 
      author: "Duckweed" # 新增：默认作者

  # 根目录下所有页面默认配置（关键修复：覆盖pages目录和根目录）
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
      render_with_liquid: true # 关键：所有页面默认解析Liquid，不转义HTML
      permalink: /:basename/ # 页面链接格式（archive.html → /archive/）

  # 根目录index.md配置
  - scope:
      path: "index.md"
      type: "pages"
    values:
      layout: "default"
      permalink: "/"
      render_with_liquid: true

# 分页配置（后续启用分页插件时取消注释）
# paginate: 5
# paginate_path: "/page/:num/"

# 导航栏配置（核心修复：路径匹配实际文件位置）
# 注意：如果你的页面在根目录（archive.html），则写 "- archive.html"；如果在pages目录，写 "- pages/archive.html"
header_pages:
  - archive.html # 档案（根目录.html文件）
  - friends.html # 友链（根目录.html文件）
  - about.html # 关于（根目录.html文件）
  - exhibition.html # 展览（根目录.html文件）

# ===================== 排除文件/目录 =====================
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/
  - LICENSE
  - templates/
  - scripts/
  - requirements.txt
  - README.md # 取消注释：排除根目录README.md（避免生成页面）

# ===================== Minima主题自定义 =====================
minima:
  social_links:
    # Minima 2.5+ 支持的社交平台
    - { platform: github, user_url: "https://github.com/Duckweed-yhb" }
    - { platform: email, user_url: "mailto:3071974740@qq.com" }
  skin: auto # 自动适配系统暗黑/亮色模式

# ===================== 编码与格式 =====================
encoding: utf-8
date_format: "%Y-%m-%d %H:%M" # 日期显示格式

# ===================== Markdown解析配置（核心修复） =====================
highlighter: rouge # 代码高亮
markdown: kramdown
kramdown:
  input: GFM # 支持GitHub风格Markdown
  parse_block_html: true # 解析HTML块级标签内的Markdown
  parse_span_html: true # 解析HTML行内标签内的Markdown
  escape_html: false # 关键：禁止转义HTML标签（解决style/script显示异常）
  auto_ids: true # 自动为标题生成ID
  footnote_nr: 1 # 脚注编号起始值
  syntax_highlighter_opts:
    block:
      line_numbers: false # 关闭代码行号（避免样式混乱）

# ===================== 新增：搜索功能开关（匹配header.html） =====================
has_search: false # 若未实现search.html，设为false避免报错
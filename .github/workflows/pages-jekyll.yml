name: Build and deploy Jekyll site to GitHub Pages

on:
  push:
    branches: [ main, master ]
    paths:
      # 只触发核心博客文件的构建
      - '_posts/**'
      - '_includes/**'
      - '_layouts/**'
      - '_config.yml'
      - 'assets/**'
      - 'pages/**'
      - 'index.md'
      # 排除 README 和脚本相关文件，避免被自动提交触发
      - '!README.md'
      - '!scripts/**'
      - '!.github/workflows/update-readme.yml'
  workflow_dispatch:  # 保留手动触发，方便调试

concurrency:
  group: pages-jekyll-${{ github.ref }}
  cancel-in-progress: true  # 改为 true，避免旧构建排队

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
name: Build and deploy Jekyll site to GitHub Pages

on:
  push:
    branches: [ main, master ]
    paths:
      - '_posts/**'
      - '_includes/**'
      - '_layouts/**'
      - '_config.yml'
      - 'assets/**'
      - 'pages/**'
      - 'index.md'
      - '!README.md'
      - '!scripts/**'
      - '!.github/workflows/update-readme.yml'
  workflow_dispatch:

concurrency:
  group: pages-jekyll-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Ruby 3.1（适配GitHub Pages）
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: false  # 关键：关闭缓存，强制重新安装依赖

      - name: 清理旧依赖并安装
        run: |
          rm -rf Gemfile.lock vendor
          bundle install --full-index --path vendor/bundle

      - name: Build Jekyll site（带详细日志）
        run: bundle exec jekyll build --trace --baseurl ""
        env:
          JEKYLL_ENV: production

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          token: ${{ github.token }}
<!-- _includes/meta-seo.html - SEO元标签独立组件 -->
<!-- 基础SEO配置 -->
<meta name="robots" content="index, follow">
<meta name="theme-color" content="{{ site.theme_color | default: '#0a1a3a' }}">
<meta name="description" content="{{ page.excerpt | default: site.description | default: site.title | strip_html | truncate: 160 | escape }}">
<meta name="author" content="{{ site.author | default: site.title | escape }}">

<!-- Open Graph 协议（社交分享优化） -->
<meta property="og:type" content="website">
<meta property="og:title" content="{% if page.title %}{{ page.title | escape }}{% else %}{{ site.title | escape }}{% endif %}">
<meta property="og:description" content="{{ page.excerpt | default: site.description | strip_html | truncate: 160 | escape }}">
<meta property="og:url" content="{{ page.url | absolute_url }}">
<meta property="og:site_name" content="{{ site.title | escape }}">
<!-- 可选：添加og:image（社交分享封面） -->
{%- if site.og_image -%}
<meta property="og:image" content="{{ site.og_image | absolute_url }}">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
{%- endif -%}

<!-- Twitter 卡片（推特分享优化） -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{% if page.title %}{{ page.title | escape }}{% else %}{{ site.title | escape }}{% endif %}">
<meta name="twitter:description" content="{{ page.excerpt | default: site.description | strip_html | truncate: 160 | escape }}">
{%- if site.twitter_username -%}
<meta name="twitter:site" content="@{{ site.twitter_username }}">
<meta name="twitter:creator" content="@{{ site.twitter_username }}">
{%- endif -%}
{%- if site.og_image -%}
<meta name="twitter:image" content="{{ site.og_image | absolute_url }}">
{%- endif -%}

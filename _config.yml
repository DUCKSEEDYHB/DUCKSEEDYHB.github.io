# ===================== 站点核心配置 =====================
title: Duckweed's Space
email: 3071974740@qq.com
description: >-
  Duckweed的个人成长空间，记录编程学习、考研备考、读书思考的点滴
baseurl: ""
url: "https://Duckweed-yhb.github.io"
timezone: Asia/Shanghai

# ===================== 主题与插件配置 =====================
theme: minima
plugins:
  - jekyll-feed
  - jekyll-paginate

# ===================== 内容配置 =====================
defaults:
  # 文章默认使用 post 布局
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  # pages 目录下的页面默认使用 page 布局
  - scope:
      path: "pages"
      type: "pages"
    values:
      layout: "page"

# 分页配置
paginate: 5
paginate_path: "/page/:num/"

# 导航栏配置（改为指向 pages 目录下的文件）
# 这里的路径是文件的实际路径，不是URL
header_pages:
  - pages/about.md
  - pages/archive.md
  - pages/exhibition.md
  - pages/friends.md

# ===================== 排除文件 =====================
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/
  - README.md
  - LICENSE
  - templates/
  - scripts/
  - .github/

# ===================== Minima主题自定义 =====================
minima:
  social_links: [] # 清空内置社交链接，使用 _includes/social.html 自定义

# ===================== 编码与格式 =====================
encoding: utf-8
date_format: "%Y-%m-%d %H:%M"
name: Auto Update README (Jekyll Blog)

# 触发条件：精准控制触发场景，避免无效执行
on:
  push:
    branches: [ main, master ]  # 兼容main/master两种主流分支名
    paths:
      - '_posts/**/*.md'
      - '_posts/**/*.markdown'
      - 'templates/**'
      - 'scripts/**'
      - 'README.md'  # 新增：README本身修改也触发（避免冲突）
      - '.github/workflows/**'  # 新增：工作流文件修改后自测
    # 排除不需要触发的文件（可选，根据你的需求调整）
    paths-ignore:
      - '_site/**'
      - '.jekyll-cache/**'
      - 'vendor/**'
  workflow_dispatch:  # 手动触发（优先级最高）
  schedule:
    - cron: '0 0 * * *'  # 每天 UTC 0 点更新（北京时间 8 点）
    # 可选：增加每6小时更新一次（按需启用）
    # - cron: '0 */6 * * *'

# 并发控制：避免同一分支同时运行多个实例导致冲突
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-readme:
    runs-on: ubuntu-latest
    # 仅在主仓库运行，避免fork仓库误触发
    if: github.repository_owner == github.actor || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write  # 写入代码权限（必须）
      pull-requests: write  # PR权限（可选，如果你需要自动提PR）
      actions: read  # 读取Action日志权限（排障用）
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 拉取完整提交历史
          token: ${{ github.token }}
          # 新增：拉取所有分支（避免分支切换问题）
          ref: ${{ github.ref }}

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          # 可选：启用缓存（如果有requirements.txt）
          # cache: 'pip'
          # cache-dependency-path: 'scripts/requirements.txt'

      - name: 安装依赖
        run: |
          set -e  # 出错立即退出
          python -m pip install --upgrade pip
          # 新增：容错处理 - 安装失败时重试
          pip install --retries 3 --timeout 30 pyyaml || pip install --user pyyaml
          # 可选：安装其他依赖（如需要生成目录树的tree命令）
          # sudo apt-get update && sudo apt-get install -y tree

      - name: 检查生成脚本是否存在
        id: check_script
        run: |
          if [ -f "scripts/generate_readme.py" ]; then
            echo "script_exists=true" >> $GITHUB_OUTPUT
            echo "✅ 找到生成脚本：scripts/generate_readme.py"
          else
            echo "script_exists=false" >> $GITHUB_OUTPUT
            echo "❌ 错误：scripts/generate_readme.py 文件不存在！"
          fi

      - name: 生成 README 内容
        if: steps.check_script.outputs.script_exists == 'true'
        run: |
          set -e
          # 新增：切换到脚本目录（避免路径问题）
          cd scripts || exit 1
          # 执行生成脚本
          python generate_readme.py
          # 切回根目录
          cd ..
          # 新增：验证README是否生成成功
          if [ -f "README.md" ]; then
            echo "✅ README.md 文件存在，生成成功！"
            # 可选：打印README前10行验证内容
            head -10 README.md
          else
            echo "❌ 错误：README.md 文件生成失败！"
            exit 1
          fi

      - name: 提交更新
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto update README from Jekyll posts [skip ci]"
          # 新增：只提交指定文件，避免误提交其他修改
          file_pattern: "README.md"
          branch: ${{ github.ref_name }}  # 动态适配分支名（兼容main/master）
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
          # 优化：仅在有变更时提交，避免空提交
          skip_fetch: true
          skip_checkout: true
          # 谨慎使用force：仅在确认无冲突时启用（建议注释掉）
          # push_options: "--force"
          # 新增：提交描述（便于区分）
          commit_author: "GitHub Actions <actions@github.com>"
          # 新增：如果提交失败，自动创建PR（可选）
          create_branch: false
          # pull_request:
          #   title: "Auto update README from Jekyll posts"
          #   body: "This PR is auto-generated by GitHub Actions to update README with latest posts info."

      - name: 脚本不存在时的容错处理
        if: steps.check_script.outputs.script_exists == 'false'
        run: |
          echo "❌ 终止工作流：缺少核心生成脚本！"
          # 可选：发送通知（如GitHub Issues/钉钉/邮件，按需启用）
          # gh issue create --title "README生成失败：脚本缺失" --body "scripts/generate_readme.py 文件不存在，请检查！"
          exit 1

      - name: 工作流完成通知
        if: always()
        run: |
          echo "📝 README更新工作流执行完成！"
          echo "状态：${{ job.status }}"
          # 可选：输出日志链接（便于排障）
          echo "日志链接：https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
<!-- _includes/head.html - 页面头部核心组件 -->
<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge, chrome=1">
<!-- 视口设置：禁止缩放+适配刘海屏/全面屏 -->
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">

<!-- 图标配置 -->
<!-- 基础favicon（64x64） -->
<link rel="icon" type="image/png" href="/favicon.png" sizes="64x64">
<!-- 补充常用尺寸 -->
<link rel="icon" type="image/png" href="/favicon-32x32.png" sizes="32x32">
<link rel="icon" type="image/png" href="/favicon-16x16.png" sizes="16x16">
<!-- 移动端应用图标 -->
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<!-- 兼容老旧浏览器 -->
<link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">

<!-- 引入SEO元标签组件 -->
{%- include meta-seo.html -%}

<!-- 原有核心SEO功能 -->
{%- seo -%}

<!-- 样式加载优化：preload预加载主样式 -->
<link rel="preload" href="{{ "/assets/css/custom-bg.css" | relative_url }}" as="style" onload="this.onload=null;this.rel='stylesheet'">
<link rel="preload" href="{{ "/assets/css/main.css" | relative_url }}" as="style" onload="this.onload=null;this.rel='stylesheet'">
<link rel="preload" href="{{ "/assets/css/header.css" | relative_url }}" as="style" onload="this.onload=null;this.rel='stylesheet'">
<!-- noscript降级处理 -->
<noscript>
  <link rel="stylesheet" href="{{ "/assets/css/custom-bg.css" | relative_url }}">
  <link rel="stylesheet" href="{{ "/assets/css/main.css" | relative_url }}">
  <link rel="stylesheet" href="{{ "/assets/css/header.css" | relative_url }}">
</noscript>

<!-- 引入Font Awesome图标库（CDN+本地降级） -->
<link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<noscript>
  <link rel="stylesheet" href="{{ "/assets/css/font-awesome.min.css" | relative_url }}">
</noscript>

<!-- RSS订阅 -->
{%- feed_meta -%}

<!-- 谷歌分析（异步加载） -->
{%- if jekyll.environment == 'production' and site.google_analytics -%}
  <script async src="https://www.googletagmanager.com/gtag/js?id={{ site.google_analytics }}"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', '{{ site.google_analytics }}');
  </script>
{%- endif -%}

<!-- 可选：预加载常用字体 -->
{%- if site.preload_fonts -%}
<link rel="preload" href="{{ site.preload_fonts | relative_url }}" as="font" type="font/woff2" crossorigin>
{%- endif -%}

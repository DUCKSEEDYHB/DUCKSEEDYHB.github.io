# ===================== 站点核心配置 =====================
title: Duckweed's Space
email: 3071974740@qq.com
description: >-
  Duckweed的个人成长空间，记录编程学习、考研备考、读书思考的点滴
baseurl: ""
url: "https://Duckweed-yhb.github.io"
timezone: Asia/Shanghai

# ===================== 主题与插件配置 =====================
theme: minima
plugins:
  - jekyll-feed
  - jekyll-paginate

# ===================== 内容配置 =====================
defaults:
  # 文章默认使用 post 布局
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  # pages 目录下的页面默认使用 page 布局
  - scope:
      path: "pages"
      type: "pages"
    values:
      layout: "page"
  # 根目录 index.md 默认使用 default 布局（新增，避免布局缺失）
  - scope:
      path: "index.md"
      type: "pages"
    values:
      layout: "default"
      permalink: "/"

# 分页配置
paginate: 5
paginate_path: "/page/:num/"

# 导航栏配置（只保留实际存在的文件，删除缺失的about/exhibition）
header_pages:
  - pages/archive.md
  - pages/friends.md

# ===================== 排除文件 =====================
# 移除 .github/ 排除（否则Pages工作流会被屏蔽），保留必要排除项
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/
  - README.md
  - LICENSE
  - templates/
  - scripts/

# ===================== Minima主题自定义 =====================
minima:
  social_links: [] # 清空内置社交链接，使用 _includes/social.html 自定义

# ===================== 编码与格式 =====================
encoding: utf-8
date_format: "%Y-%m-%d %H:%M"
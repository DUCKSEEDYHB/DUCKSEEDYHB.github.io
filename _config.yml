# ===================== 站点核心配置 =====================
title: Duckweed's Space
email: 3071974740@qq.com
description: >-
  Duckweed的个人成长空间，记录编程学习、考研备考、读书思考的点滴
baseurl: ""
url: "https://Duckweed-yhb.github.io"
timezone: Asia/Shanghai
lang: zh-CN
github_username: Duckweed-yhb

# ===================== 主题与插件配置 =====================
theme: minima
plugins:
  - jekyll-feed
  # 关键修复：暂时注释分页插件，避免初始化崩溃（后续补充分页代码后再开启）
  # - jekyll-paginate
  - jekyll-seo-tag

# ===================== 内容配置 =====================
defaults:
  # 文章默认使用 post 布局
  - scope:
      path: "_posts"
      type: "posts"
    values:
      layout: "post"
      math: true
      permalink: /posts/:title/

  # pages 目录下的页面默认使用 default 布局
  - scope:
      path: "pages"
      type: "pages"
    values:
      layout: "default"

  # 根目录 index.md 强制使用 default 布局
  - scope:
      path: "index.md"
      type: "pages"
    values:
      layout: "default"
      permalink: "/"

# 关键修复：注释分页配置（和插件配套）
# paginate: 5
# paginate_path: "/page/:num/"

# 导航栏配置
header_pages:
  - pages/archive.md
  - pages/friends.md
  - pages/about.md

# ===================== 排除文件 =====================
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/
  - LICENSE
  - templates/
  - scripts/
  - requirements.txt
  # - README.md

# ===================== Minima主题自定义 =====================
minima:
  social_links:
    # 关键修复：仅保留 minima 2.5 完全支持的平台，移除 link 类型（避免主题崩溃）
    - { platform: github,  user_url: "https://github.com/Duckweed-yhb" }
    - { platform: email,   user_url: "mailto:3071974740@qq.com" }
  skin: auto

# ===================== 编码与格式 =====================
encoding: utf-8
date_format: "%Y-%m-%d %H:%M"

# ===================== 额外优化配置 =====================
highlighter: rouge
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter_opts:
    block:
      # line_numbers: true

